plugins {
    alias(libs.plugins.android.application)
}

android {
    namespace 'com.googleapi.bluetoothweight'
    compileSdk 34

    defaultConfig {
        applicationId "com.googleapi.bluetoothweight"
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName "1.0"

        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}



dependencies {
    implementation 'androidx.print:print:1.0.0'
    implementation 'com.itextpdf:itext7-core:7.2.5'
    implementation 'pub.devrel:easypermissions:3.0.0'
    implementation 'androidx.recyclerview:recyclerview:1.3.2'
    implementation 'androidx.cardview:cardview:1.0.0'
    implementation 'com.google.android.material:material:1.9.0'
    // DantSu ESC/POS Printer Library (Best for USB printing)
// DantSu ESC/POS Printer Library
    // DantSu ESC/POS Printer Library
    implementation 'com.github.DantSu:ESCPOS-ThermalPrinter-Android:3.2.0'

    // AndroidX Print Helper
    implementation 'androidx.print:print:1.1.0'
    implementation libs.appcompat
    implementation libs.material
    testImplementation libs.junit
    androidTestImplementation libs.ext.junit
    androidTestImplementation libs.espresso.core
}